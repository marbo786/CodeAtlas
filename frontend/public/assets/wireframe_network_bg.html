<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wireframe Network Background</title>
<style>
  :root{
    --bg: #050b12;
    --line: #2c7a8c;
    --node: #4fd1e0;
    --pulse: #d6fbff;
    --pulse-b: #6ee7d8;
    --mesh: #1c3540;
    --label: #5f9aa6;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; }

  #network-bg{
    position:fixed; inset:0; width:100%; height:100%; z-index:0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(24,60,72,0.3), transparent 60%),
      radial-gradient(ellipse at 75% 80%, rgba(24,60,72,0.22), transparent 55%),
      var(--bg);
  }
  #network-bg::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(5,11,18,0.6) 100%);
  }
  #network-bg svg{
    width:100%; height:100%; display:block;
    transition: transform 0.3s ease-out;
  }

  .sheath{ fill:none; stroke:var(--node); opacity:0.11; filter:url(#bigBlur); stroke-linecap:round; }
  .sheath.dim{ opacity:0.05; }
  .strand{ fill:none; stroke-width:1.1; opacity:0.5; filter:url(#softGlow); stroke-linecap:round; }
  .strand.s1{ stroke:var(--node); }
  .strand.s2{ stroke:var(--line); opacity:0.4; }
  .strand.s3{ stroke:var(--node); }
  .strand.dim{ opacity:0.25; }

  .pulse{ fill:var(--pulse); filter:url(#hotGlow); }
  .pulse-b{ fill:var(--pulse-b); filter:url(#hotGlow); }

  .node-shape{
    stroke:var(--node); stroke-width:1.1; fill:rgba(79,209,224,0.04);
    filter:url(#softGlow); transform-box:fill-box; transform-origin:center;
    animation: breathe 5.5s ease-in-out infinite;
  }
  .node-shape.hub{ stroke-width:1.4; fill:rgba(79,209,224,0.07); }
  .d2{ animation-delay:-1.2s; } .d3{ animation-delay:-2.4s; }
  .d4{ animation-delay:-3.6s; } .d5{ animation-delay:-0.6s; }
  @keyframes breathe{ 0%,100%{opacity:0.55;} 50%{opacity:1;} }

  .ring{
    fill:none; stroke:var(--pulse); stroke-width:1.3; opacity:0.5;
    filter:url(#hotGlow); transform-box:fill-box; transform-origin:center;
    animation: ringPulse 3.2s ease-in-out infinite;
  }
  @keyframes ringPulse{ 0%,100%{opacity:0.22;} 50%{opacity:0.65;} }

  .mesh-line{ stroke:var(--mesh); stroke-width:0.6; opacity:0.45; }
  .mesh-dot{ fill:var(--mesh); opacity:0.6; }
  #mesh-tl, #mesh-br{ animation: drift 40s ease-in-out infinite; }
  #mesh-br{ animation-duration:52s; animation-direction:reverse; }
  @keyframes drift{ 0%,100%{transform:translate(0,0);} 50%{transform:translate(6px,-8px);} }

  .label{
    fill:var(--label); font-family:'Courier New',monospace; font-size:9px;
    letter-spacing:1.5px; opacity:0.35; text-transform:uppercase;
  }

  @media (prefers-reduced-motion: reduce){
    .node-shape, .ring, #mesh-tl, #mesh-br{ animation:none; }
    .pulse, .pulse-b{ display:none; }
  }

  .demo{
    position:relative; z-index:1; height:100%; display:flex; flex-direction:column;
    align-items:flex-start; justify-content:center; padding:6vw; color:#eafcff;
  }
  .demo h1{ margin:0 0 .4rem; font-size:clamp(2rem,5vw,3.4rem); font-weight:600; letter-spacing:0.01em; }
  .demo p{ margin:0; max-width:34ch; color:#8fb9c2; font-size:1.05rem; line-height:1.5; }
</style>
</head>
