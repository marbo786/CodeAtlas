version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=${N8N_PUBLIC_URL:-http://localhost:5678/}
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=UTC
      - NODES_EXCLUDE=[]
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=none
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_PROGRESS=false
      - N8N_RUNNERS_GRANT_TOKEN_TTL=300
      - N8N_DIAGNOSTICS_ENABLED=false
    volumes:
      - n8n_data:/home/node/.n8n
      - shared_tmp:/tmp
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_started

  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-codeatlas_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-super_secret_dev_password}
      - POSTGRES_DB=${POSTGRES_DB:-codeatlas_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  qdrant:
    image: qdrant/qdrant:v1.15.0
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  parser-service:
    build:
      context: ./parser-service
    container_name: parser-service
    restart: unless-stopped
    environment:
      - PARSER_API_KEY=${PARSER_API_KEY}
      - PARSER_MAX_REPO_SIZE=524288000
      - PARSER_ALLOWED_REPO_ROOT=${PARSER_ALLOWED_REPO_ROOT:-/tmp}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    ports:
      - "8000:8000"
    volumes:
      - shared_tmp:/tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      - N8N_BASE_URL=http://n8n:5678
      - N8N_INGEST_PATH=${N8N_INGEST_PATH:-/webhook/ingest}
      - N8N_CHAT_PATH=${N8N_CHAT_PATH:-/webhook/63556229-4761-45c0-bdab-619a1b99f2de/chat}
      - N8N_READ_API_PATH=${N8N_READ_API_PATH:-/webhook/read-api}
    depends_on:
      parser-service:
        condition: service_healthy
      n8n:
        condition: service_healthy

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  n8n_data:
  postgres_data:
  qdrant_data:
  shared_tmp:
  caddy_data:
  caddy_config:
