version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=UTC
      - NODES_EXCLUDE=[]
      # Expose docker socket or give it access to run commands (like git, semgrep) 
      # Since we need to run git clone and semgrep locally on n8n node, 
      # we need an n8n image that has these tools, or we execute them in a custom image.
      # Wait, standard n8n image doesn't have semgrep. It might have git.
      # For now, we will use the standard n8n image, we can install semgrep via Execute Command or build a custom Dockerfile later if needed.
    volumes:
      - n8n_data:/root/.n8n
      # Mount /tmp so n8n can write to /tmp for git clone
      - shared_tmp:/tmp

  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-codeatlas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  qdrant:
    image: qdrant/qdrant:v1.15.0
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  parser-service:
    build:
      context: ./parser-service
    container_name: parser-service
    restart: unless-stopped
    environment:
      - PARSER_API_KEY=${PARSER_API_KEY}
      - PARSER_ALLOWED_REPO_ROOT=${PARSER_ALLOWED_REPO_ROOT:-/projects}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    ports:
      - "8000:8000"
    volumes:
      # Mount /tmp to share cloned repos with n8n
      - shared_tmp:/tmp

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      - N8N_BASE_URL=http://n8n:5678
      - N8N_CHAT_PATH=/webhook/chat
    depends_on:
      - parser-service

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  n8n_data:
  postgres_data:
  qdrant_data:
  shared_tmp:
  caddy_data:
  caddy_config:
