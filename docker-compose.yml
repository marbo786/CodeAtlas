version: '3.8'

services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      - NODES_EXCLUDE=[]
      # Expose docker socket or give it access to run commands (like git, semgrep) 
      # Since we need to run git clone and semgrep locally on n8n node, 
      # we need an n8n image that has these tools, or we execute them in a custom image.
      # Wait, standard n8n image doesn't have semgrep. It might have git.
      # For now, we will use the standard n8n image, we can install semgrep via Execute Command or build a custom Dockerfile later if needed.
    volumes:
      - n8n_data:/root/.n8n
      # Mount /tmp so n8n can write to /tmp for git clone
      - shared_tmp:/tmp

  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=codeatlas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  parser-service:
    build:
      context: ./parser-service
    container_name: parser-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount /tmp to share cloned repos with n8n
      - shared_tmp:/tmp
      # Mount local workspace for development testing
      - .:/projects/codeatlas

volumes:
  n8n_data:
  postgres_data:
  qdrant_data:
  shared_tmp:
